<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Porthos Labs</title>

  <style>
    :root{
      --bg:#05070A;
      --text:#F5F7FA;
      --muted:#96A0AE;
      --line:rgba(255,255,255,0.08);
      --blue:#2563EB;
      --blue-2:#60A5FA;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    img{display:block;max-width:100%}

    .container{max-width:1180px;margin:0 auto;padding:0 24px}

    /* HEADER */
    .header{
      position:sticky;top:0;
      backdrop-filter:blur(10px);
      background:rgba(5,7,10,0.8);
      border-bottom:1px solid var(--line);
    }

    .header-inner{
      min-height:120px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo-wrap img{
      width:420px;
    }

    .nav{display:flex;gap:24px;color:var(--muted)}
    .btn{
      padding:12px 20px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--blue),var(--blue-2));
      color:white;
    }

    /* HERO */
    .hero{padding:80px 0}

    .hero-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:60px;
      align-items:center;
    }

    h1{
      font-size:70px;
      line-height:1;
      margin:20px 0;
    }

    /* PREVIEW */
    .preview{
      border:1px solid var(--line);
      border-radius:30px;
      padding:20px;
      background:rgba(255,255,255,0.02);
    }

    .preview-title{
      display:flex;
      align-items:center;
      gap:12px;
    }

    /* SMALL SENTINEL ICON */
    .sentinel-badge-icon{
      width:32px;
      height:32px;
      border-radius:10px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(96,165,250,0.3);
      box-shadow:0 0 20px rgba(37,99,235,0.2);
    }

    .sentinel-badge-icon img{
      width:24px;
      height:24px;
      filter:brightness(1.4) saturate(1.3);
    }

    /* SYSTEM MAP */
    .system-map{
      margin-top:20px;
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:20px;
    }

    .chip{
      padding:12px;
      border-radius:12px;
      border:1px solid var(--line);
      text-align:center;
      color:var(--muted);
    }

    /* 🔥 MAIN SENTINEL CORE */
    .sentinel-core{
      text-align:center;
      padding:40px 20px;
    }

    .sentinel-core-icon{
      width:160px;
      height:160px;
      border-radius:30px;
      display:grid;
      place-items:center;
      margin:0 auto;

      background:linear-gradient(
        180deg,
        rgba(255,255,255,0.08),
        rgba(96,165,250,0.15)
      );

      border:1px solid rgba(96,165,250,0.3);

      box-shadow:
        0 0 80px rgba(37,99,235,0.35),
        inset 0 0 30px rgba(96,165,250,0.2);
    }

    .sentinel-core-icon img{
      width:125px;
      height:125px;
      object-fit:contain;

      filter:
        brightness(1.5)
        saturate(1.4)
        drop-shadow(0 0 20px rgba(37,99,235,0.5));
    }

    .sentinel-core span{
      display:block;
      margin-top:14px;
      font-size:16px;
      color:#D7E6FF;
      font-weight:600;
    }

    /* RESPONSIVE */
    @media(max-width:900px){
      .hero-grid{grid-template-columns:1fr}
      .logo-wrap img{width:260px}
    }

  </style>
</head>

<body>

<header class="header">
  <div class="container header-inner">
    <div class="logo-wrap">
      <img src="porthos-logo.png" alt="Porthos Labs">
    </div>

    <nav class="nav">
      <a>Capabilities</a>
      <a>Sentinel</a>
      <a>Architecture</a>
      <a class="btn">Get a demo</a>
    </nav>
  </div>
</header>

<main>

<section class="hero">
  <div class="container hero-grid">

    <div>
      <h1>Porthos Labs builds the control layer for data and AI.</h1>
      <p style="color:#96A0AE">
        Real-time visibility, governance, and enforcement across data systems and AI.
      </p>
    </div>

    <div class="preview">

      <div class="preview-title">
        <div class="sentinel-badge-icon">
          <img src="sentinel-logo.png">
        </div>
        <span>Sentinel</span>
      </div>

      <div class="system-map">

        <div>
          <div class="chip">CRM data</div>
          <div class="chip">Risk models</div>
          <div class="chip">Data warehouse</div>
        </div>

        <!-- 🔥 BIG SENTINEL -->
        <div class="sentinel-core">
          <div class="sentinel-core-icon">
            <img src="sentinel-logo.png">
          </div>
          <span>Sentinel</span>
        </div>

        <div>
          <div class="chip">AI copilots</div>
          <div class="chip">Internal apps</div>
          <div class="chip">External APIs</div>
        </div>

      </div>

    </div>

  </div>
</section>

</main>

</body>
</html>
