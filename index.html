<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Porthos Labs</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* BOOT */
#boot {
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  letter-spacing:4px;
  animation:fadeOut 2.5s forwards;
}

@keyframes fadeOut {
  0% {opacity:1;}
  80% {opacity:1;}
  100% {opacity:0; visibility:hidden;}
}

/* CORE */
.core {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:600px;
  height:600px;
}

/* glow */
.glow {
  position:absolute;
  inset:0;
  background:rgba(37,99,235,0.3);
  filter:blur(150px);
  border-radius:50%;
  animation:pulse 4s infinite;
}

@keyframes pulse {
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.2);}
}

/* rings */
.ring {
  position:absolute;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:50%;
  inset:0;
  animation:spin linear infinite;
}

.r1 {animation-duration:20s;}
.r2 {animation-duration:14s; transform:scale(1.2);}
.r3 {animation-duration:10s; transform:scale(1.4);}

@keyframes spin {
  from {transform:rotate(0deg);}
  to {transform:rotate(360deg);}
}

/* lines */
.line {
  position:absolute;
  top:50%;
  left:50%;
  width:250px;
  height:2px;
  background:linear-gradient(to right,transparent, #3b82f6, transparent);
  animation:blink 2s infinite;
}

@keyframes blink {
  0%,100%{opacity:0.2;}
  50%{opacity:1;}
}

/* center */
.center {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:corePulse 2s infinite;
}

@keyframes corePulse {
  0%,100%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.1);}
}

.center img {
  width:180px;
}

/* nodes */
.node {
  position:absolute;
  padding:6px 10px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  font-size:12px;
}

.ai {top:10%; left:50%; transform:translateX(-50%);}
.api {right:10%; top:50%; transform:translateY(-50%);}
.data {bottom:10%; left:50%; transform:translateX(-50%);}
.flow {left:10%; top:50%; transform:translateY(-50%);}

/* stats */
.stats {
  position:absolute;
  bottom:40px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}

.card {
  border:1px solid rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="boot">INITIALIZING SENTINEL</div>

<div class="core">

  <div class="glow"></div>

  <div class="ring r1"></div>
  <div class="ring r2"></div>
  <div class="ring r3"></div>

  <div class="line"></div>
  <div class="line" style="transform:rotate(90deg)"></div>

  <div class="center">
    <img src="sentinel-logo.png">
  </div>

  <div class="node ai">AI</div>
  <div class="node api">API</div>
  <div class="node data">DATA</div>
  <div class="node flow">FLOW</div>

</div>

<div class="stats">
  <div class="card">27 Agents</div>
  <div class="card">18 Blocked</div>
  <div class="card">96% Safe</div>
</div>

</body>
</html>
